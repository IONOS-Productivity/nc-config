on:
  pull_request:

name: "Trigger: pull request action"
permissions: {}

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          severity: error
          ignore_paths: .github/check-shell-config.sh
        env:
          SHELLCHECK_OPTS: --shell sh

      - name: Run ShellCheck for Bash-only helper
        run: shellcheck --shell bash --severity error .github/check-shell-config.sh
